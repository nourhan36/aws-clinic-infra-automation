- name: Deploy Django app container
  hosts: role_app
  become: true
  gather_facts: false

  pre_tasks:
    - name: Wait until SSH is ready
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 10
        sleep: 5

    - name: Gather facts after connection is ready
      ansible.builtin.setup:

  roles:
    - app