{% extends 'base.html' %}
{% block title %}Password Updated - ClinicLife{% endblock %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem;">
    <div class="auth-card" style="max-width:420px; text-align:center; padding:2.75rem 2.5rem;">

        <div style="width:64px; height:64px; border-radius:18px; background:rgba(34,197,94,0.18); display:grid; place-items:center; margin:0 auto 1.5rem;">
            <i class="fa-solid fa-check" style="font-size:1.75rem; color:#86efac;"></i>
        </div>

        <h2 style="margin:0 0 0.6rem; font-size:1.65rem;">Password Updated!</h2>
        <p style="color:var(--text-muted); margin-bottom:2rem; line-height:1.65; font-size:0.92rem;">
            Your password has been changed successfully. You can now use your new credentials to log in.
        </p>

        <a href="{% url 'dashboard_redirect' %}" class="btn-primary btn-icon" style="text-decoration:none; justify-content:center; width:100%; padding:0.82rem; font-size:0.95rem;">
            <i class="fa-solid fa-gauge"></i> Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
