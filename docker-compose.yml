services:
  web:
    build: .
    container_name: clinic_web
    ports:
      - "8000:8000"
    env_file:
      - ./app/.env
    command: >
      sh -c "python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: clinic_db
    env_file:
      - ./app/.env
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: